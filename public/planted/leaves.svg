<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="leafLower" x1="18%" y1="8%" x2="82%" y2="92%">
      <stop offset="0%" stop-color="#d4eaa8"/>
      <stop offset="35%" stop-color="#96b86a"/>
      <stop offset="100%" stop-color="#5a7440"/>
    </linearGradient>
    <linearGradient id="leafUpper" x1="72%" y1="10%" x2="22%" y2="88%">
      <stop offset="0%" stop-color="#d8eca8"/>
      <stop offset="40%" stop-color="#8eb662"/>
      <stop offset="100%" stop-color="#567238"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7a9456"/>
      <stop offset="100%" stop-color="#4a6034"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#2b2620" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g filter="url(#soft)">
    <!-- stem -->
    <path
      d="M24 54 C31 47, 38 38, 46 28"
      stroke="url(#stemGrad)"
      stroke-width="2.4"
      stroke-linecap="round"
      fill="none"
    />

    <!-- lower leaf -->
    <path
      d="M12 52 C4 44, 4 30, 14 20 C22 13, 36 14, 44 24 C50 32, 48 46, 36 54 C28 58, 18 58, 12 52 Z"
      fill="url(#leafLower)"
    />
    <path
      d="M18 22 C26 24, 34 32, 38 42"
      stroke="#4a6034"
      stroke-width="1.2"
      stroke-linecap="round"
      fill="none"
      opacity="0.55"
    />
    <path
      d="M22 26 C27 30, 30 36, 28 44"
      stroke="#4a6034"
      stroke-width="0.9"
      stroke-linecap="round"
      fill="none"
      opacity="0.42"
    />
    <path
      d="M30 24 C35 28, 38 34, 36 42"
      stroke="#4a6034"
      stroke-width="0.9"
      stroke-linecap="round"
      fill="none"
      opacity="0.38"
    />
    <path
      d="M16 30 C20 26, 26 24, 30 26"
      stroke="#f0f8d8"
      stroke-width="1.6"
      stroke-linecap="round"
      fill="none"
      opacity="0.5"
    />

    <!-- upper leaf -->
    <path
      d="M40 34 C34 24, 38 10, 50 6 C60 4, 66 12, 66 22 C66 32, 58 40, 48 40 C42 40, 40 38, 40 34 Z"
      fill="url(#leafUpper)"
    />
    <path
      d="M48 10 C54 14, 58 22, 56 30"
      stroke="#4a6034"
      stroke-width="1.1"
      stroke-linecap="round"
      fill="none"
      opacity="0.52"
    />
    <path
      d="M52 12 C56 17, 58 24, 55 30"
      stroke="#4a6034"
      stroke-width="0.8"
      stroke-linecap="round"
      fill="none"
      opacity="0.38"
    />
    <path
      d="M44 16 C48 13, 54 14, 58 18"
      stroke="#f2fadc"
      stroke-width="1.4"
      stroke-linecap="round"
      fill="none"
      opacity="0.48"
    />
  </g>
</svg>