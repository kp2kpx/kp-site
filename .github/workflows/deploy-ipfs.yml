# ============================================================
# Gasless IPFS + IPNS publish for kp2kp.eth.
#
# On every push to main:
#   1. Build the Next.js static export (out/).
#   2. Pin out/ to IPFS via Pinata (KP's account, persistent).
#   3. Update KP's self-owned IPNS name to the new root CID via
#      the w3name service (signed locally, key never leaves CI).
#   4. Publish the SAME IPNS record to the public IPFS DHT with
#      kubo, so eth.limo and ipfs.io/ipns resolve it. w3name alone
#      only serves the record over HTTP, never on the DHT, which is
#      why kp2kp.eth went "Content Unreachable" before this step.
#   5. Unpin superseded CIDs from Pinata, keeping the new CID and
#      the immediately-previous one (one-step rollback). Without
#      this, every deploy left its old full-site copy pinned and
#      the free plan filled up with stale duplicates.
#
# No gas. No onchain interaction. KP sets ipns://<name> on
# kp2kp.eth exactly once; this keeps that name current forever.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   PINATA_JWT             Pinata API JWT with pinning permission.
#   IPNS_SIGNING_KEY_B64   base64 Ed25519 IPNS private key
#                          (printed once at setup; the public name
#                          is the value pasted into ENS).
# ============================================================

name: Deploy to IPFS and update IPNS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ipfs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Count export files (Pinata free tier = 500)
        run: |
          ALL=$(find out -type f | wc -l)
          PIN=$(find out -type f ! -name '*.txt' | wc -l)
          echo "Export files: $ALL total, $PIN pin-eligible (txt RSC payloads skipped)"
          if [ "$PIN" -gt 500 ]; then
            echo "::error::Pin-eligible file count $PIN exceeds Pinata free-tier limit (500)"
            exit 1
          fi

      # Capture the CID the IPNS name currently points at BEFORE we
      # pin the new build. This is the "previous" live CID; we keep
      # it pinned as a one-step rollback and unpin everything older.
      - name: Resolve previous live CID
        id: prev
        continue-on-error: true
        env:
          IPNS_SIGNING_KEY_B64: ${{ secrets.IPNS_SIGNING_KEY_B64 }}
        run: |
          node scripts/resolve-current-cid.mjs | tee prev-output.txt || true
          PREV=$(grep '^CID=' prev-output.txt | cut -d= -f2 || true)
          echo "cid=$PREV" >> "$GITHUB_OUTPUT"
          echo "Previous live CID: ${PREV:-<none>}"

      # Pinata free tier counts every file in every pin (500 max).
      # Drop the previous live root before pinning ~318 new files so
      # replacement deploys do not stack two full copies of the site.
      - name: Unpin previous live root before new pin (Pinata)
        continue-on-error: true
        if: steps.prev.outputs.cid != ''
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          PREV: ${{ steps.prev.outputs.cid }}
        run: |
          code=$(curl -s -o /tmp/unpin-prev.txt -w '%{http_code}' \
            -X DELETE -H "Authorization: Bearer ${PINATA_JWT}" \
            "https://api.pinata.cloud/pinning/unpin/${PREV}")
          echo "Unpin previous live root ${PREV} -> HTTP ${code}"
          cat /tmp/unpin-prev.txt || true

      - name: Pin to IPFS (Pinata)
        id: pin
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          node scripts/pin-pinata.mjs out | tee pin-output.txt
          CID=$(grep '^CID=' pin-output.txt | cut -d= -f2)
          if [ -z "$CID" ]; then echo "::error::No CID produced by pin step"; exit 1; fi
          echo "cid=$CID" >> "$GITHUB_OUTPUT"
          echo "Pinned root CID: $CID"

      - name: Publish IPNS (w3name)
        env:
          IPNS_SIGNING_KEY_B64: ${{ secrets.IPNS_SIGNING_KEY_B64 }}
        run: node scripts/publish-ipns.mjs "${{ steps.pin.outputs.cid }}"

      - name: Publish IPNS to public DHT (kubo)
        continue-on-error: true
        env:
          IPNS_SIGNING_KEY_B64: ${{ secrets.IPNS_SIGNING_KEY_B64 }}
        run: |
          chmod +x scripts/dht-publish.sh
          scripts/dht-publish.sh "${{ steps.pin.outputs.cid }}"

      # Pinata free tier allows 500 files total; this site pins ~318.
      # Keep only the new live root (no rollback copy) so the next
      # deploy has room to replace in place.
      - name: Unpin superseded CIDs (Pinata)
        continue-on-error: true
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          KEEP: ${{ steps.pin.outputs.cid }}
        run: node scripts/pinata-maintenance.mjs --apply

      - name: Summary
        run: |
          echo "### IPFS deploy complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Root CID: \`${{ steps.pin.outputs.cid }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Previous CID (kept as rollback): \`${{ steps.prev.outputs.cid }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pinata gateway: https://gateway.pinata.cloud/ipfs/${{ steps.pin.outputs.cid }}/" >> "$GITHUB_STEP_SUMMARY"
          echo "- IPNS (DHT): https://ipfs.io/ipns/k51qzi5uqu5dirkws21royn4pbng52n780ezucpigsyahksijsdoybfodpj7zp/" >> "$GITHUB_STEP_SUMMARY"
          echo "- kp2kp.eth should reflect this within minutes via IPNS." >> "$GITHUB_STEP_SUMMARY"
